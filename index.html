<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO (TASK-020) — diperbarui secara dinamis oleh updateMetaTags() saat navigasi -->
    <meta
      name="description"
      content="Baca Pancasila, Pembukaan UUD 1945, dan seluruh Pasal UUD 1945 secara online. Lengkap, akurat, dan dapat diakses kapan saja."
    />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="Indonesian" />
    <meta name="author" content="Pancasila &amp; UUD 1945 Web App" />

    <!-- Open Graph (TASK-020) — default untuk halaman utama -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pancasila &amp; UUD 1945" />
    <meta property="og:title" content="Pancasila &amp; UUD 1945 — Konstitusi Indonesia" />
    <meta
      property="og:description"
      content="Baca Pancasila, Pembukaan UUD 1945, dan seluruh Pasal UUD 1945 secara online. Lengkap, akurat, dan dapat diakses kapan saja."
    />
    <meta property="og:image" content="https://pasaluud1945.web.app/images/og-banner.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="id_ID" />

    <!-- Twitter Card (TASK-020) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pancasila &amp; UUD 1945 — Konstitusi Indonesia" />
    <meta
      name="twitter:description"
      content="Baca Pancasila, Pembukaan UUD 1945, dan seluruh Pasal UUD 1945 secara online. Lengkap, akurat, dan dapat diakses kapan saja."
    />
    <meta name="twitter:image" content="https://pasaluud1945.web.app/images/og-banner.png" />

    <!-- Alternate language — memperjelas bahasa konten ke Google (GUD-SEO-005) -->
    <link rel="alternate" hreflang="id" href="https://pasaluud1945.web.app/" />

    <!-- Theme color — merah primer aplikasi (TASK-008) -->
    <meta name="theme-color" content="#C62828" />

    <!-- Apple PWA meta tags (TASK-008) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="UUD 1945" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/icon-180.png" />

    <!-- Favicon (SVG dipertahankan + PNG fallback) -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%icons/icon-32.png" />

    <!-- manifest.json diinjeksi oleh vite-plugin-pwa saat build -->
    <!-- Public Sans — typeface institusional (preconnect untuk performa) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Pancasila &amp; UUD 1945</title>

    <!-- WebSite JSON-LD dengan SearchAction — sitewide (TASK-031) -->
    <!-- Script ini bersifat statis dan tidak dikelola oleh injectJsonLd() di runtime -->
    <script type="application/ld+json" id="__jsonld-website">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Pancasila & UUD 1945",
        "url": "https://pasaluud1945.web.app",
        "description": "Baca Pancasila, Pembukaan UUD 1945, dan seluruh Pasal UUD 1945 secara online. Lengkap, akurat, dan dapat diakses kapan saja.",
        "inLanguage": "id",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://pasaluud1945.web.app/cari?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script>
      // SPA Routing Receiver — memulihkan path yang di-redirect dari 404.html
      // Script ini hanya aktif saat request datang dari GitHub Pages 404.html redirect
      // (kondisi: l.search dimulai dengan '/')
      // Referensi: https://github.com/rafgraph/spa-github-pages
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
