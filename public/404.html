<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Pancasila &amp; UUD 1945</title>
    <script>
      // SPA Routing Fallback untuk GitHub Pages
      // Saat GitHub Pages tidak menemukan route (404), file ini di-serve.
      // Script ini mengambil path yang diminta, mengenkodenya sebagai query string,
      // lalu me-redirect ke index.html agar client-side router dapat menanganinya.
      //
      // pathSegmentsToKeep = 1 → mempertahankan 1 segmen path depan (/pasal-pancasila-uud-1945/)
      // Referensi: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
